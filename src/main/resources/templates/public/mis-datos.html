<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Mis Datos – Clínica Veterinaria</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container px-4">
            <a class="navbar-brand text-primary fw-bold" th:href="@{/}">
                <i class="fas fa-paw me-2"></i> Clínica Veterinaria
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/public/mis-datos}">Mis Datos</a></li>
                    <li class="nav-item"><a class="btn btn-primary ms-3" th:href="@{/public/pedir-cita}">Pedir Cita</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        <div class="container-xl px-4 mt-5">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="card shadow-lg border-0 rounded-lg mt-5">
                        <div class="card-header justify-content-center"><h3 class="fw-light my-4"><i class="fas fa-search me-2"></i>Consulta tus datos</h3></div>
                        <div class="card-body">
                            <p class="text-muted text-center">Introduce tu correo electrónico para visualizar el historial, próximas citas y tratamientos activos de tus mascotas.</p>
                            <form>
                                <div class="mb-3">
                                    <label class="small mb-1">Correo electrónico</label>
                                    <div class="input-group">
                                        <span class="input-group-text" id="basic-addon1"><i class="fas fa-at"></i></span>
                                        <input class="form-control py-3" type="email" placeholder="Introduce el email registrado en la clínica" aria-label="Email" required/>
                                    </div>
                                </div>
                                <div class="d-grid mt-4 mb-0">
                                    <button class="btn btn-primary btn-block py-2" type="button" onclick="alert('Esta funcionalidad se conectará el backend para recuperar tu datos de forma segura próximamente.')">Buscar Datos</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
