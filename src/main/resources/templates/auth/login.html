<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Acceso – Clínica Veterinaria</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header text-center fw-bold">Clínica Veterinaria</div>
                <div class="card-body">
                    <h5 class="mb-3 text-center">Iniciar sesión</h5>

                    <div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña incorrectos.</div>
                    <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente.</div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                    <div class="small text-muted mt-3">Usuario inicial: admin / admin123</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
