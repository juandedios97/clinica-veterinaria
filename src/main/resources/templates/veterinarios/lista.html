<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Equipo veterinario de la clínica."/>
    <title>Veterinarios – Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4"><div class="page-header-content pt-4">
                    <div class="row align-items-center justify-content-between">
                        <div class="col-auto mt-4">
                            <h1 class="page-header-title"><div class="page-header-icon"><i data-feather="user-check"></i></div>Veterinarios</h1>
                            <div class="page-header-subtitle">Equipo médico de la clínica</div>
                        </div>
                        <div class="col-12 col-xl-auto mt-4">
                            <a th:href="@{/veterinarios/nuevo}" class="btn btn-light"><i data-feather="plus" class="me-1"></i> Nuevo veterinario</a>
                        </div>
                    </div>
                </div></div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>
                <div class="card mb-4">
                    <div class="card-header"><i data-feather="user-check" class="me-1"></i> Listado</div>
                    <div class="card-body p-0">
                        <div th:if="${veterinarios.empty}" class="p-4 text-muted text-center">No hay veterinarios registrados.</div>
                        <table th:unless="${veterinarios.empty}" class="table table-hover table-striped mb-0" id="datatablesSimple">
                            <thead><tr><th>#</th><th>Foto</th><th>Nombre</th><th>Especialidad</th><th>Perfil</th><th>Acciones</th></tr></thead>
                            <tbody>
                                <tr th:each="v : ${veterinarios}">
                                    <td th:text="${v.id}"></td>
                                    <td>
                                        <img th:if="${v.foto != null}" th:src="@{/veterinarios/foto/{id}(id=${v.id})}" alt="Foto veterinario"
                                             class="rounded border" style="width:40px;height:40px;object-fit:cover;"/>
                                        <span th:unless="${v.foto != null}" class="text-muted">—</span>
                                    </td>
                                    <td th:text="${v.nombreCompleto}"></td>
                                    <td th:text="${v.especialidad ?: '—'}"></td>
                                    <td>
                                        <div class="small" th:text="${v.numeroColegiado != null and !#strings.isEmpty(v.numeroColegiado) ? 'Colegiado: ' + v.numeroColegiado : 'Colegiado: —'}"></div>
                                        <div class="small" th:text="${v.email ?: 'Email: —'}"></div>
                                        <div class="small" th:text="${v.telefono != null and !#strings.isEmpty(v.telefono) ? 'Tel: ' + v.telefono : 'Tel: —'}"></div>
                                    </td>
                                    <td>
                                        <a th:href="@{/veterinarios/ver/{id}(id=${v.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="eye"></i></a>
                                        <a th:href="@{/veterinarios/editar/{id}(id=${v.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="edit"></i></a>
                                        <a th:href="@{/veterinarios/eliminar/{id}(id=${v.id})}" class="btn btn-datatable btn-icon btn-transparent-dark" onclick="return confirm('¿Eliminar?')"><i data-feather="trash-2"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light"><div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div></footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/datatables/datatables-simple-demo.js}"></script>
</body>
</html>
