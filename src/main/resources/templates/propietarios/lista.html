<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Listado de propietarios de la clínica veterinaria."/>
    <title>Propietarios – Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4">
                    <div class="page-header-content pt-4">
                        <div class="row align-items-center justify-content-between">
                            <div class="col-auto mt-4">
                                <h1 class="page-header-title">
                                    <div class="page-header-icon"><i data-feather="users"></i></div>
                                    Propietarios
                                </h1>
                                <div class="page-header-subtitle">Gestión de propietarios registrados</div>
                            </div>
                            <div class="col-12 col-xl-auto mt-4">
                                <a th:href="@{/propietarios/nuevo}" class="btn btn-light">
                                    <i data-feather="user-plus" class="me-1"></i> Nuevo propietario
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>
                <!-- Buscador -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/propietarios}" method="get" class="d-flex gap-2">
                            <input type="text" name="buscar" th:value="${buscar}"
                                   placeholder="Buscar por nombre o apellidos..." class="form-control"/>
                            <button type="submit" class="btn btn-primary">Buscar</button>
                            <a th:href="@{/propietarios}" class="btn btn-outline-secondary">Limpiar</a>
                        </form>
                    </div>
                </div>
                <!-- Tabla -->
                <div class="card mb-4">
                    <div class="card-header"><i data-feather="users" class="me-1"></i> Listado</div>
                    <div class="card-body p-0">
                        <div th:if="${propietarios.empty}" class="p-4 text-center text-muted">No hay propietarios registrados.</div>
                        <table th:unless="${propietarios.empty}" class="table table-hover table-striped mb-0" id="datatablesSimple">
                            <thead><tr><th>#</th><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Mascotas</th><th>Acciones</th></tr></thead>
                            <tbody>
                                <tr th:each="p : ${propietarios}">
                                    <td th:text="${p.id}"></td>
                                    <td th:text="${p.nombreCompleto}"></td>
                                    <td th:text="${p.telefono}"></td>
                                    <td th:text="${p.email}"></td>
                                    <td><span class="badge bg-primary-soft text-primary" th:text="${p.mascotas.size()}"></span></td>
                                    <td>
                                        <a th:href="@{/propietarios/ver/{id}(id=${p.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="eye"></i></a>
                                        <a th:href="@{/propietarios/editar/{id}(id=${p.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="edit"></i></a>
                                        <a th:href="@{/propietarios/eliminar/{id}(id=${p.id})}" class="btn btn-datatable btn-icon btn-transparent-dark" onclick="return confirm('¿Eliminar este propietario?')"><i data-feather="trash-2"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light">
            <div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div>
        </footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/datatables/datatables-simple-demo.js}"></script>
</body>
</html>
