<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Pedir Cita – Clínica Veterinaria</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container px-4">
            <a class="navbar-brand text-primary fw-bold" th:href="@{/}">
                <i class="fas fa-paw me-2"></i> Clínica Veterinaria
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/public/mis-datos}">Mis Datos</a></li>
                    <li class="nav-item"><a class="btn btn-primary ms-3 active" th:href="@{/public/pedir-cita}">Pedir Cita</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        <div class="container-xl px-4 mt-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card shadow-lg border-0 rounded-lg mt-5">
                        <div class="card-header justify-content-center"><h3 class="fw-light my-4"><i class="fas fa-calendar-check me-2"></i>Solicitar Cita</h3></div>
                        <div class="card-body">
                            <p class="text-muted text-center">Completa este formulario y nos pondremos en contacto contigo para conrmar tu cita o si quieres buscar hueco inmediato llama al <strong>900 123 456</strong>.</p>
                            <form>
                                <div class="mb-3">
                                    <label class="small mb-1">Email del propietario</label>
                                    <input class="form-control" type="email" placeholder="Introduce tu correo electrónico" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="small mb-1">Nombre de la Mascota</label>
                                    <input class="form-control" type="text" placeholder="¿Cómo se llama?" required/>
                                </div>
                                <div class="row gx-3 mb-3">
                                    <div class="col-md-6 mb-3">
                                        <label class="small mb-1">Fecha preferida</label>
                                        <input class="form-control" type="date" required/>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="small mb-1">Motivo</label>
                                        <select class="form-select" required>
                                            <option value="">Selecciona un motivo</option>
                                            <option value="REVISION">Revisión General / Control</option>
                                            <option value="VACUNACION">Vacunación</option>
                                            <option value="URGENCIA">Urgencia</option>
                                            <option value="OTRO">Otro problema</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="small mb-1">Comentarios adicionales</label>
                                    <textarea class="form-control" rows="3" placeholder="Cuéntanos más detalles..."></textarea>
                                </div>
                                <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                    <a class="small" th:href="@{/}">Volver al inicio</a>
                                    <button type="button" class="btn btn-primary" onclick="alert('Solicitud enviada correctamente. (Esta funcionalidad se conectará el backend próximamente)')">Solicitar Cita</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
