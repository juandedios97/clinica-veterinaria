<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Vacunación de la clínica veterinaria."/>
    <title>Vacunación – Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4"><div class="page-header-content pt-4">
                    <div class="row align-items-center justify-content-between">
                        <div class="col-auto mt-4">
                            <h1 class="page-header-title"><div class="page-header-icon"><i data-feather="shield"></i></div>Vacunación</h1>
                            <div class="page-header-subtitle">Control de vacunas y refuerzos</div>
                        </div>
                        <div class="col-12 col-xl-auto mt-4">
                            <a th:href="@{/vacunacion/nuevo}" class="btn btn-light"><i data-feather="plus" class="me-1"></i> Nueva vacuna</a>
                        </div>
                    </div>
                </div></div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>

                <div class="row g-4 mb-4">
                    <div class="col-lg-4">
                        <div class="card bg-danger text-white h-100">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="small text-white-75 fw-bold text-uppercase mb-1">Vencidas</div>
                                    <div class="fs-3 fw-bold" th:text="${vencidasCount}">0</div>
                                </div>
                                <i data-feather="alert-triangle" style="width:42px;height:42px;opacity:.5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card bg-warning text-white h-100">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="small text-white-75 fw-bold text-uppercase mb-1">Próximas</div>
                                    <div class="fs-3 fw-bold" th:text="${proximasCount}">0</div>
                                </div>
                                <i data-feather="clock" style="width:42px;height:42px;opacity:.5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card bg-success text-white h-100">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="small text-white-75 fw-bold text-uppercase mb-1">Al día</div>
                                    <div class="fs-3 fw-bold" th:text="${alDiaCount}">0</div>
                                </div>
                                <i data-feather="check-circle" style="width:42px;height:42px;opacity:.5"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header"><i data-feather="shield" class="me-1"></i> Registro de vacunación</div>
                    <div class="card-body p-0">
                        <div th:if="${vacunaciones.empty}" class="p-4 text-muted text-center">No hay vacunaciones registradas.</div>
                        <table th:unless="${vacunaciones.empty}" class="table table-hover table-striped mb-0" id="datatablesSimple">
                            <thead>
                                <tr><th>Mascota</th><th>Tipo de vacuna</th><th>Fecha aplicada</th><th>Próxima dosis</th><th>Estado</th><th>Acciones</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="v : ${vacunaciones}">
                                    <td>
                                        <div class="fw-bold" th:text="${v.mascota.nombre}"></div>
                                        <div class="small text-muted" th:text="${v.mascota.propietario.nombreCompleto}"></div>
                                    </td>
                                    <td th:text="${v.tipoVacuna}"></td>
                                    <td th:text="${#temporals.format(v.fechaAplicada,'dd/MM/yyyy')}"></td>
                                    <td th:text="${v.proximaDosis != null ? #temporals.format(v.proximaDosis,'dd/MM/yyyy') : '—'}"></td>
                                    <td><span class="badge" th:classappend="${v.badgeClass}" th:text="${v.estadoCalculado}"></span></td>
                                    <td>
                                        <a th:href="@{/vacunacion/editar/{id}(id=${v.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="edit"></i></a>
                                        <a th:href="@{/vacunacion/eliminar/{id}(id=${v.id})}" class="btn btn-datatable btn-icon btn-transparent-dark" onclick="return confirm('¿Eliminar este registro de vacunación?')"><i data-feather="trash-2"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light"><div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div></footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/datatables/datatables-simple-demo.js}"></script>
</body>
</html>
