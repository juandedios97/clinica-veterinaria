<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Gestión de usuarios y roles."/>
    <title>Usuarios – Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4"><div class="page-header-content pt-4">
                    <div class="row align-items-center justify-content-between">
                        <div class="col-auto mt-4">
                            <h1 class="page-header-title"><div class="page-header-icon"><i data-feather="shield"></i></div>Usuarios y roles</h1>
                            <div class="page-header-subtitle">Administración de acceso al sistema</div>
                        </div>
                        <div class="col-12 col-xl-auto mt-4">
                            <a th:href="@{/usuarios/nuevo}" class="btn btn-light"><i data-feather="plus" class="me-1"></i> Nuevo usuario</a>
                        </div>
                    </div>
                </div></div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>
                <div class="card mb-4">
                    <div class="card-header"><i data-feather="users" class="me-1"></i> Cuentas</div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped mb-0" id="datatablesSimple">
                            <thead><tr><th>#</th><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr></thead>
                            <tbody>
                                <tr th:each="u : ${usuarios}">
                                    <td th:text="${u.id}"></td>
                                    <td th:text="${u.nombreCompleto}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td><span class="badge bg-primary" th:text="${u.rol}"></span></td>
                                    <td><span class="badge" th:classappend="${u.activo} ? 'bg-success' : 'bg-secondary'" th:text="${u.activo} ? 'Sí' : 'No'"></span></td>
                                    <td>
                                        <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="btn btn-datatable btn-icon btn-transparent-dark me-1"><i data-feather="edit"></i></a>
                                        <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" class="btn btn-datatable btn-icon btn-transparent-dark" onclick="return confirm('¿Eliminar usuario?')"><i data-feather="trash-2"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/datatables/datatables-simple-demo.js}"></script>
</body>
</html>
