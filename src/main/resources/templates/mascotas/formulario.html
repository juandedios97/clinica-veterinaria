<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Formulario de mascota."/>
    <title th:text="${titulo} + ' – Clínica Veterinaria'">Mascota</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4">
                    <div class="page-header-content pt-4">
                        <h1 class="page-header-title">
                            <div class="page-header-icon"><i data-feather="github"></i></div>
                            <span th:text="${titulo}">Mascota</span>
                        </h1>
                    </div>
                </div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div class="row justify-content-center">
                    <div class="col-xl-8">
                        <div class="card mb-4">
                            <div class="card-header"><i data-feather="github" class="me-1"></i> Datos de la mascota</div>
                            <div class="card-body">
                                <form th:action="@{/mascotas/guardar}" th:object="${mascota}" method="post" enctype="multipart/form-data" novalidate>
                                    <input type="hidden" th:field="*{id}"/>
                                    <div class="row gx-3 mb-3">
                                        <div class="col-md-6">
                                            <label class="small mb-1">Nombre *</label>
                                            <input type="text" th:field="*{nombre}" class="form-control"
                                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"/>
                                            <div class="invalid-feedback" th:errors="*{nombre}"></div>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="small mb-1">Especie *</label>
                                            <input type="text" th:field="*{especie}" class="form-control" placeholder="Perro, Gato..."
                                                   th:classappend="${#fields.hasErrors('especie')} ? 'is-invalid'"/>
                                            <div class="invalid-feedback" th:errors="*{especie}"></div>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="small mb-1">Raza</label>
                                            <input type="text" th:field="*{raza}" class="form-control"/>
                                        </div>
                                    </div>
                                    <div class="row gx-3 mb-3">
                                        <div class="col-md-5">
                                            <label class="small mb-1">Fecha de nacimiento</label>
                                            <input type="date" th:field="*{fechaNacimiento}" class="form-control"
                                                   th:classappend="${#fields.hasErrors('fechaNacimiento')} ? 'is-invalid'"/>
                                            <div class="invalid-feedback" th:errors="*{fechaNacimiento}"></div>
                                        </div>
                                        <div class="col-md-7">
                                            <label class="small mb-1">Propietario *</label>
                                            <select th:field="*{propietario.id}" class="form-select"
                                                    th:classappend="${#fields.hasErrors('propietario')} ? 'is-invalid'">
                                                <option value="">-- Selecciona propietario --</option>
                                                <option th:each="p : ${propietarios}"
                                                        th:value="${p.id}"
                                                        th:text="${p.nombreCompleto}"></option>
                                            </select>
                                            <div class="invalid-feedback" th:errors="*{propietario}"></div>
                                        </div>
                                    </div>
                                    <div class="row gx-3 mb-3 align-items-end">
                                        <div class="col-md-8">
                                            <label class="small mb-1">Foto</label>
                                            <input type="file" name="fotoArchivo" class="form-control" accept="image/*"/>
                                            <div class="small text-muted mt-1">Formatos: JPG/PNG/WebP. Máximo 5MB.</div>
                                        </div>
                                        <div class="col-md-4" th:if="${mascota.id != null and mascota.foto != null}">
                                            <img th:src="@{/mascotas/foto/{id}(id=${mascota.id})}" alt="Foto de mascota"
                                                 class="img-fluid rounded border" style="max-height: 120px; object-fit: cover;"/>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">
                                            <i data-feather="save" class="me-1"></i> Guardar
                                        </button>
                                        <a th:href="@{/mascotas}" class="btn btn-light">Cancelar</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light">
            <div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div>
        </footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
