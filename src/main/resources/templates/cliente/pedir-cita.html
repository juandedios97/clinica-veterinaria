<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Pedir cita - Mascota Sana</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #f6faf9; color: #14213d; }
        .client-card { border: 1px solid rgba(15, 118, 110, .12); border-radius: .5rem; box-shadow: 0 .75rem 1.75rem rgba(15, 23, 42, .07); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container px-4">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/cliente}"><i class="fas fa-paw me-2"></i>Mascota Sana</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-primary" th:href="@{/cliente}">Mi panel</a>
            <form th:action="@{/logout}" method="post"><button class="btn btn-outline-secondary" type="submit">Salir</button></form>
        </div>
    </div>
</nav>

<main class="container px-4 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="client-card bg-white">
                <div class="p-4 border-bottom">
                    <h1 class="h3 fw-bolder mb-2"><i class="fas fa-calendar-check me-2 text-primary"></i>Solicitar cita</h1>
                    <p class="text-muted mb-0">Elige mascota, veterinario y fecha preferida. La cita quedara pendiente para gestionarla desde la clinica.</p>
                </div>
                <div class="p-4">
                    <div th:if="${mascotas.empty}" class="alert alert-warning">
                        No tienes mascotas asociadas. Contacta con la clinica para activar tu area de cliente.
                    </div>
                    <form th:unless="${mascotas.empty}" th:action="@{/cliente/citas}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Mascota</label>
                            <select name="mascotaId" class="form-select" required>
                                <option th:each="m : ${mascotas}" th:value="${m.id}" th:text="${m.nombre + ' - ' + m.especie}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Veterinario</label>
                            <select name="veterinarioId" class="form-select" required>
                                <option th:each="v : ${veterinarios}" th:value="${v.id}" th:text="${v.nombreCompleto}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha y hora preferida</label>
                            <input name="fechaHora" type="datetime-local" class="form-control" required/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Motivo</label>
                            <textarea name="motivo" rows="4" maxlength="255" class="form-control" placeholder="Revision, vacuna, tratamiento, urgencia..." required></textarea>
                        </div>
                        <div class="d-flex justify-content-between gap-3">
                            <a th:href="@{/cliente}" class="btn btn-light">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Solicitar cita</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
