<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Ficha completa de la mascota."/>
    <title th:text="${mascota.nombre} + ' – Clínica Veterinaria'">Mascota</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4">
                    <div class="page-header-content pt-4">
                        <div class="row align-items-center justify-content-between">
                            <div class="col-auto mt-4">
                                <h1 class="page-header-title">
                                    <div class="page-header-icon"><i data-feather="github"></i></div>
                                    <span th:text="${mascota.nombre}"></span>
                                </h1>
                                <div class="page-header-subtitle" th:text="${mascota.especie + (mascota.raza != null ? ' · ' + mascota.raza : '')}"></div>
                            </div>
                            <div class="col-12 col-xl-auto mt-4 d-flex gap-2">
                                <a th:href="@{/historial/nuevo(mascotaId=${mascota.id})}" class="btn btn-success"><i data-feather="plus" class="me-1"></i> Consulta</a>
                                <a th:href="@{/citas/nuevo}" class="btn btn-light"><i data-feather="calendar" class="me-1"></i> Cita</a>
                                <a th:href="@{/mascotas/editar/{id}(id=${mascota.id})}" class="btn btn-light"><i data-feather="edit" class="me-1"></i> Editar</a>
                                <a th:href="@{/mascotas}" class="btn btn-light"><i data-feather="arrow-left" class="me-1"></i> Volver</a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>
                <div class="row g-4">
                    <div class="col-xl-4">
                        <div class="card mb-4">
                            <div class="card-header"><i data-feather="info" class="me-1"></i> Ficha</div>
                            <div class="card-body">
                                <div class="mb-3" th:if="${mascota.foto != null}">
                                    <img th:src="@{/mascotas/foto/{id}(id=${mascota.id})}" alt="Foto de mascota"
                                         class="img-fluid rounded border" style="max-height:220px;object-fit:cover;"/>
                                </div>
                                <div class="small text-muted fw-bold mb-1">Especie</div>
                                <div class="mb-2" th:text="${mascota.especie}"></div>
                                <div class="small text-muted fw-bold mb-1">Raza</div>
                                <div class="mb-2" th:text="${mascota.raza ?: '—'}"></div>
                                <div class="small text-muted fw-bold mb-1">Fecha de nacimiento</div>
                                <div class="mb-2" th:text="${mascota.fechaNacimiento != null ? #temporals.format(mascota.fechaNacimiento,'dd/MM/yyyy') : '—'}"></div>
                                <div class="small text-muted fw-bold mb-1">Propietario</div>
                                <div>
                                    <a th:href="@{/propietarios/ver/{id}(id=${mascota.propietario.id})}"
                                       th:text="${mascota.propietario.nombreCompleto}"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-8">
                        <!-- Citas -->
                        <div class="card mb-4">
                            <div class="card-header"><i data-feather="calendar" class="me-1"></i> Citas</div>
                            <div class="card-body p-0">
                                <div th:if="${mascota.citas.empty}" class="p-3 text-muted text-center">Sin citas registradas.</div>
                                <table th:unless="${mascota.citas.empty}" class="table table-sm mb-0">
                                    <thead class="table-light">
                                        <tr><th>Fecha</th><th>Motivo</th><th>Veterinario</th><th>Estado</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${mascota.citas}">
                                            <td th:text="${#temporals.format(c.fechaHora,'dd/MM/yyyy')}"></td>
                                            <td th:text="${c.motivo}"></td>
                                            <td th:text="${c.veterinario.nombreCompleto}"></td>
                                            <td>
                                                <span th:text="${c.estado}"
                                                      th:classappend="${c.estado.name() == 'COMPLETADA'} ? 'bg-success' : (${c.estado.name() == 'CANCELADA'} ? 'bg-danger' : 'bg-warning text-dark')"
                                                      class="badge"></span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <!-- Historial -->
                        <div class="card mb-4">
                            <div class="card-header"><i data-feather="file-text" class="me-1"></i> Historial médico</div>
                            <div class="card-body p-0">
                                <div th:if="${mascota.historial.empty}" class="p-3 text-muted text-center">Sin consultas registradas.</div>
                                <table th:unless="${mascota.historial.empty}" class="table table-sm mb-0">
                                    <thead class="table-light">
                                        <tr><th>Fecha</th><th>Diagnóstico</th><th></th></tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="h : ${mascota.historial}">
                                            <td th:text="${#temporals.format(h.fecha,'dd/MM/yyyy')}"></td>
                                            <td th:text="${h.diagnostico ?: h.descripcion}"></td>
                                            <td>
                                                <a th:href="@{/historial/ver/{id}(id=${h.id})}" class="btn btn-datatable btn-icon btn-transparent-dark"><i data-feather="eye"></i></a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light">
            <div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div>
        </footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
