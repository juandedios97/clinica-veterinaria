<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="Perfil del veterinario."/>
    <title th:text="${veterinario.nombreCompleto} + ' – Clínica Veterinaria'">Perfil veterinario</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.png}"/>
    <script data-search-pseudo-elements defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4"><div class="page-header-content pt-4">
                    <div class="row align-items-center justify-content-between">
                        <div class="col-auto mt-4">
                            <h1 class="page-header-title"><div class="page-header-icon"><i data-feather="user-check"></i></div><span th:text="${veterinario.nombreCompleto}"></span></h1>
                            <div class="page-header-subtitle" th:text="${veterinario.especialidad ?: 'Veterinario'}"></div>
                        </div>
                        <div class="col-12 col-xl-auto mt-4 d-flex gap-2">
                            <a th:href="@{/veterinarios/editar/{id}(id=${veterinario.id})}" class="btn btn-light"><i data-feather="edit" class="me-1"></i> Editar</a>
                            <a th:href="@{/veterinarios}" class="btn btn-light"><i data-feather="arrow-left" class="me-1"></i> Volver</a>
                        </div>
                    </div>
                </div></div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div th:replace="~{layout/fragments :: alertas}"></div>
                <div class="row g-4">
                    <div class="col-xl-4">
                        <div class="card mb-4">
                            <div class="card-body text-center">
                                <img th:if="${veterinario.foto != null}" th:src="@{/veterinarios/foto/{id}(id=${veterinario.id})}" alt="Foto veterinario"
                                     class="rounded-circle border mb-3" style="width:150px;height:150px;object-fit:cover;"/>
                                <div th:unless="${veterinario.foto != null}" class="rounded-circle border mx-auto mb-3 d-flex align-items-center justify-content-center"
                                     style="width:150px;height:150px;background:#f8f9fa;">
                                    <i data-feather="user" style="width:56px;height:56px;opacity:.5"></i>
                                </div>
                                <h5 class="mb-1" th:text="${veterinario.nombreCompleto}"></h5>
                                <div class="text-muted" th:text="${veterinario.especialidad ?: '—'}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-8">
                        <div class="card mb-4">
                            <div class="card-header"><i data-feather="info" class="me-1"></i> Perfil profesional</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="small text-muted fw-bold">N.º colegiado</div>
                                        <div th:text="${veterinario.numeroColegiado ?: '—'}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="small text-muted fw-bold">Años de experiencia</div>
                                        <div th:text="${veterinario.aniosExperiencia != null ? veterinario.aniosExperiencia : '—'}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="small text-muted fw-bold">Email profesional</div>
                                        <div th:text="${veterinario.email ?: '—'}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="small text-muted fw-bold">Teléfono</div>
                                        <div th:text="${veterinario.telefono ?: '—'}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="small text-muted fw-bold">Fecha de incorporación</div>
                                        <div th:text="${veterinario.fechaIncorporacion != null ? #temporals.format(veterinario.fechaIncorporacion,'dd/MM/yyyy') : '—'}"></div>
                                    </div>
                                    <div class="col-12">
                                        <div class="small text-muted fw-bold">Biografía</div>
                                        <div th:text="${veterinario.biografia ?: '—'}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer-admin mt-auto footer-light"><div class="container-xl px-4"><div class="row"><div class="col-md-6 small">Clínica Veterinaria &copy; 2025</div></div></div></footer>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
