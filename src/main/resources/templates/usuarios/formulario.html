<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="${titulo} + ' – Clínica Veterinaria'">Usuario</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body class="nav-fixed">
<nav th:replace="~{layout/fragments :: topnav}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"><nav th:replace="~{layout/fragments :: sidenav}"></nav></div>
    <div id="layoutSidenav_content">
        <main>
            <header class="page-header page-header-dark bg-gradient-primary-to-secondary pb-10">
                <div class="container-xl px-4"><div class="page-header-content pt-4">
                    <h1 class="page-header-title"><div class="page-header-icon"><i data-feather="user"></i></div><span th:text="${titulo}">Usuario</span></h1>
                </div></div>
            </header>
            <div class="container-xl px-4 mt-n10">
                <div class="row justify-content-center"><div class="col-xl-8">
                    <div class="card mb-4">
                        <div class="card-header">Datos de acceso</div>
                        <div class="card-body">
                            <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" novalidate>
                                <input type="hidden" th:field="*{id}"/>
                                <div class="row gx-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="small mb-1">Nombre completo *</label>
                                        <input type="text" th:field="*{nombreCompleto}" class="form-control" th:classappend="${#fields.hasErrors('nombreCompleto')} ? 'is-invalid'"/>
                                        <div class="invalid-feedback" th:errors="*{nombreCompleto}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small mb-1">Usuario *</label>
                                        <input type="text" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"/>
                                        <div class="invalid-feedback" th:errors="*{username}"></div>
                                    </div>
                                </div>
                                <div class="row gx-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="small mb-1" th:text="${usuario.id == null} ? 'Contraseña *' : 'Contraseña (dejar vacío para mantener)'"></label>
                                        <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                                        <div class="invalid-feedback" th:errors="*{password}"></div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small mb-1">Rol *</label>
                                        <select th:field="*{rol}" class="form-select">
                                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <div class="form-check mb-2">
                                            <input type="checkbox" th:field="*{activo}" class="form-check-input"/>
                                            <label class="form-check-label">Activo</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="small mb-1">Propietario asociado para clientes</label>
                                    <select th:field="*{propietario.id}" class="form-select" th:classappend="${#fields.hasErrors('propietario')} ? 'is-invalid'">
                                        <option value="">Sin propietario asociado</option>
                                        <option th:each="p : ${propietarios}" th:value="${p.id}" th:text="${p.nombreCompleto + ' - ' + p.email}"></option>
                                    </select>
                                    <div class="form-text">Solo es obligatorio cuando el rol es CLIENTE.</div>
                                    <div class="invalid-feedback" th:errors="*{propietario}"></div>
                                </div>
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">Guardar</button>
                                    <a th:href="@{/usuarios}" class="btn btn-light">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div></div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
